x-runtime-security: &runtime-security
  user: "10001:10001"
  read_only: true
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  tmpfs:
    - /tmp:size=64m,mode=1777

x-runtime-volumes: &runtime-volumes
  - ./storage:/app/storage:rw
  - ./chroma_db:/app/chroma_db:rw
  - ./logs:/app/logs:rw

services:
  api:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-kb-api:stage8
    container_name: enterprise-kb-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Authentication is not a substitute for a reverse proxy/firewall.
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes: *runtime-volumes
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    <<: *runtime-security
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-kb-api:stage8
    container_name: enterprise-kb-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    volumes: *runtime-volumes
    mem_limit: 2g
    cpus: 1.5
    depends_on:
      api:
        condition: service_healthy
