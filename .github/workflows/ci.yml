name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  APP_ENV: development
  DASHSCOPE_API_KEY: test-key-not-used
  AUTH_JWT_SECRET: test-only-jwt-secret-at-least-32-characters-long
  LANGCHAIN_TRACING_V2: "false"
  LANGSMITH_TRACING: "false"
  LANGSMITH_API_KEY: ""

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt
      - name: Install hash-locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Install exactly pinned development tools
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: python -m ruff check app tests scripts
      - name: Type check
        run: python -m mypy
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Test without network
        run: python -m pytest -q
      - name: Assert temporary resources were cleaned
        run: python scripts/check_test_cleanup.py
      - name: Dependency audit
        run: python scripts/dependency_audit.py

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build for preview
        run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: enterprise-kb-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
